schema_version: 1

context:
  name: typst
  version: 0.14.1

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://github.com/${{ name }}/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 83d132348a8c9481a8a483cdf823d5083ba456466410935f25240f6c26e23c38

build:
  number: 1
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - cd crates/typst-cli
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
      - if: unix
        then:
          - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
          - $PREFIX/bin/typst completion zsh > $PREFIX/share/zsh/site-functions/_typst
          - $PREFIX/bin/typst completion bash > $PREFIX/share/bash-completion/completions/typst
          - $PREFIX/bin/typst completion fish > $PREFIX/share/fish/vendor_completions.d/typst.fish
      - if: unix
        then:
          - mkdir -p $PREFIX/etc/conda/env_vars.d
          - 'echo {\"TYPST_PACKAGE_PATH\": \"$PREFIX/share/typst/packages\", \"TYPST_FONT_PATHS\": \"$PREFIX/fonts\"} > $PREFIX/etc/conda/env_vars.d/typst.json'
        else:
          - mkdir %PREFIX%\etc\conda\env_vars.d

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - if: linux
      then: openssl

tests:
  - package_contents:
      bin:
        - typst
      files:
        - etc/conda/env_vars.d/typst.json
      strict: true
  - script:
      - typst --version
      - typst info
      - if: unix
        then:
          - typst info 2>&1 | grep TYPST_FONT_PATHS | grep $CONDA_PREFIX/fonts
          - typst info 2>&1 | grep TYPST_PACKAGE_PATH | grep $CONDA_PREFIX/share/typst/packages
        else:
          - typst info 2>&1 | findstr TYPST_FONT_PATHS | findstr "%CONDA_PREFIX%\fonts"
          - typst info 2>&1 | findstr TYPST_PACKAGE_PATH | findstr "%CONDA_PREFIX%\share\typst\packages"
about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
    - THIRDPARTY_LICENSES.yaml
  summary: A new markup-based typesetting system that is powerful and easy to learn.
  homepage: https://github.com/typst/typst

extra:
  recipe-maintainers:
    - AdrianFreundQC
    - freundTech
    - pavelzw
